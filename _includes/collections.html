{% assign labels = "blog,projects,tutorials,polls" | split: "," %}


{% for lab in labels %}

<a id="link-{{lab}}" class="navlink LightText" style="font-size: 3vw;" href="/{{ lab }}/">
<div style="justify-content: space-around;">
    <div style="font-size: 5vh;">{{ lab }}</div>
</div>
</a>

{% endfor %}
