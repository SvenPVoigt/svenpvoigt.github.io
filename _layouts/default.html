<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Begin Jekyll SEO tag v2.6.1 -->
  <title>{{site.title}} - {{page.title}}</title>
  <meta name="description" content={{site.description}} {{page.description}} />
  <!-- End Jekyll SEO tag -->
  <link rel="stylesheet" href="{{ site.baseurl }}/static/css/main.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/static/css/header.css">
  {% for stylesheet in page.stylesheets %}
    <link rel="stylesheet" href="{{ site.baseurl }}/static/css/{{stylesheet}}.css">
  {% endfor %}
</head>

<body>
  <header class="site-header" role="banner">
    {% include header.html %}
  </header>

  <div class="maincontainer griditem">
    <div class="leftcontent griditem">
      {% if page.leftcontent %}
        {% include page.leftcontent %}
      {% else %}
        {% include defaultleft.html %}
      {% endif %}
    </div>
    <div class="content griditem">
      {{ content }}
    </div>
  </div>
</body>

</html>
